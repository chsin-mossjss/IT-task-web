<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT 組任務管理系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { background-color: #f8f9fa; font-family: "Microsoft JhengHei", sans-serif; }
        .project-card { border-left: 5px solid #0d6efd; margin-bottom: 25px; }
        .task-item { background-color: #ffffff; border: 1px solid #dee2e6; margin-bottom: 10px; padding: 15px; border-radius: 8px; transition: 0.3s; }
        .task-item:hover { box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .filter-section { background: #fff; padding: 20px; border-radius: 10px; margin-bottom: 30px; }
        .status-select { font-weight: bold; width: 120px; cursor: pointer; }
        #calendar { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .fc-event { cursor: pointer; border: none; padding: 2px 5px; }
        select[multiple] { min-height: 120px; cursor: pointer; }
        option { padding: 8px; border-bottom: 1px solid #eee; }
        option:checked { background-color: #0d6efd !important; color: white; }
    </style>
</head>
<body>

<div id="login-screen" class="d-flex flex-column align-items-center justify-content-center vh-100 bg-light">
    <div class="card p-5 shadow-sm text-center border-0" style="border-radius: 15px;">
        <h2 class="mb-4">🚀 IT 組任務管理系統</h2>
        <p class="text-muted mb-4">請使用公司或授權的 Google 帳號登入</p>
        <div id="google-login-button" class="d-inline-block"></div>
    </div>
</div>

<div id="app-screen" style="display: none;">
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div></div> <h1 class="text-center mb-0 m-auto">🚀 IT 組任務管理系統</h1>
            <button class="btn btn-outline-danger" onclick="handleSignOut()">登出</button>
        </div>

        <div class="filter-section shadow-sm">
            <div class="row g-3 mb-3">
                <div class="col-md-6 d-flex align-items-center">
                    <div class="btn-group w-100" role="group">
                        <input type="radio" class="btn-check" name="viewMode" id="viewList" checked onchange="toggleView()">
                        <label class="btn btn-outline-primary" for="viewList">📋 看板模式</label>
                        <input type="radio" class="btn-check" name="viewMode" id="viewCalendar" onchange="toggleView()">
                        <label class="btn btn-outline-primary" for="viewCalendar">📅 日曆模式</label>
                    </div>
                </div>
                <div class="col-md-3">
                    <button class="btn btn-dark w-100" data-bs-toggle="modal" data-bs-target="#addProjectModal">＋ 建立事項</button>
                </div>
                <div class="col-md-3">
                    <button class="btn btn-primary w-100" data-bs-toggle="modal" data-bs-target="#addTaskModal">＋ 新增任務</button>
                </div>
            </div>

            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label text-muted small mb-1">負責人篩選 (點擊多選)</label>
                    <select id="filterMember" class="form-select" multiple onchange="renderDashboard()">
                        <option value="clear" selected>-- 全部顯示 (清除選擇) --</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label text-muted small mb-1">事項篩選 (點擊多選)</label>
                    <select id="filterProject" class="form-select" multiple onchange="renderDashboard()">
                        <option value="clear" selected>-- 全部顯示 (清除選擇) --</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label text-muted small mb-1">狀態篩選 (點擊多選)</label>
                    <select id="filterStatus" class="form-select" multiple onchange="renderDashboard()">
                        <option value="clear" selected>-- 全部顯示 (清除選擇) --</option>
                        <option value="未開始">未開始</option>
                        <option value="進行中">進行中</option>
                        <option value="已完成">已完成</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="listView"><div id="dashboardContent"></div></div>
        <div id="calendarView" style="display: none;"><div id="calendar"></div></div>
    </div>
</div>

<div class="modal fade" id="addProjectModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">📂 建立新事項</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="projectForm" class="row g-3">
                    <div class="col-12">
                        <label class="form-label">事項名稱</label>
                        <input type="text" id="proj_name" class="form-control" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label">負責組長</label>
                        <select id="proj_leader" class="form-select" onchange="updateProjectMembers()"></select>
                    </div>
                    <div class="col-12">
                        <label class="form-label">參與組員</label>
                        <div id="proj_members_checkboxes" class="border p-2 rounded"></div>
                    </div>
                    <div class="col-12">
                        <label class="form-label">描述</label>
                        <textarea id="proj_desc" class="form-control" rows="2"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary" id="saveProjectBtn" onclick="submitProject()">儲存事項</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="addTaskModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">✅ 新增任務</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="taskForm" class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">所屬事項</label>
                        <select id="task_project_name" class="form-select" onchange="updateTaskOwners()" required></select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">任務名稱</label>
                        <input type="text" id="task_name" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">任務類型</label>
                        <select id="task_type" class="form-select" onchange="toggleTaskForm()">
                            <option value="單一任務">單一任務</option>
                            <option value="重覆任務">重覆任務</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">循環週期</label>
                        <select id="task_period" class="form-select" disabled>
                            <option value="N/A">N/A</option>
                            <option value="每天">每天</option>
                            <option value="每週">每週</option>
                            <option value="每月">每月</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">合作性質</label>
                        <select id="task_nature" class="form-select" onchange="toggleTaskForm()">
                            <option value="個人任務">個人任務</option>
                            <option value="協作任務">協作任務</option>
                        </select>
                    </div>
                    <div class="col-md-8" id="div_owner_single">
                        <label class="form-label">負責人 (單選)</label>
                        <select id="task_owner_single" class="form-select"></select>
                    </div>
                    <div class="col-md-8 d-none" id="div_owner_multi">
                        <label class="form-label">負責人 (多選)</label>
                        <div id="task_owners_checkboxes" class="border p-2 rounded" style="max-height: 80px; overflow-y: auto;"></div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label text-primary" id="label_start_date">截止日期</label>
                        <input type="date" id="task_start_date" class="form-control" required>
                    </div>
                    <div class="col-md-4 d-none" id="div_end_date">
                        <label class="form-label text-danger">結束日期</label>
                        <input type="date" id="task_end_date" class="form-control">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">特定時間</label>
                        <input type="time" id="task_time" class="form-control">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary" id="saveTaskBtn" onclick="submitTask()">儲存任務</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="editTaskModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">✏️ 編輯或刪除任務</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit_old_project_name">
                <input type="hidden" id="edit_old_task_name">
                <input type="hidden" id="edit_task_row_idx">
                <div class="mb-3">
                    <label class="form-label">所屬事項</label>
                    <input type="text" class="form-control" id="edit_project_name_display" disabled>
                </div>
                <div class="mb-3">
                    <label class="form-label">任務名稱</label>
                    <input type="text" class="form-control" id="edit_task_name">
                </div>
                <div class="mb-3">
                    <label class="form-label">當前狀態</label>
                    <select id="edit_task_status" class="form-select">
                        <option value="未開始">未開始</option>
                        <option value="進行中">進行中</option>
                        <option value="已完成">已完成</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer d-flex justify-content-between">
                <button type="button" class="btn btn-danger" id="deleteTaskBtn" onclick="deleteTask()">刪除任務</button>
                <div>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" id="updateTaskBtn" onclick="updateTask()">儲存修改</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const RENDER_URL = 'https://it-task.onrender.com'; 
    let googleToken = ""; 
    let rawData = { projects: [], tasks: [], members: [] };
    let calendar;

    // --- Google 登入邏輯 ---
    window.onload = function () {
        google.accounts.id.initialize({
            client_id: "995607600714-k2qf7tpmr2le1iiuc3lnt66915pab59t.apps.googleusercontent.com", 
            callback: handleCredentialResponse
        });
        google.accounts.id.renderButton(
            document.getElementById("google-login-button"),
            { theme: "outline", size: "large", text: "signin_with" }  
        );
    };
    
    function handleCredentialResponse(response) {
        googleToken = response.credential; 
        document.getElementById("login-screen").classList.replace("d-flex", "d-none");
        document.getElementById("app-screen").style.display = "block";
        init(); 
    }

    function handleSignOut() {
        location.reload(); 
    }

    async function fetchWithAuth(url, options = {}) {
        if (!options.headers) options.headers = {};
        options.headers['Authorization'] = 'Bearer ' + googleToken; 
        const response = await fetch(url, options);
        if (response.status === 401) { alert("登入失效"); handleSignOut(); throw new Error("Unauthorized"); }
        return response;
    }

    // --- 初始化與資料獲取 ---
    async function init() {
        try {
            document.getElementById('dashboardContent').innerHTML = '<div class="text-center py-5"><div class="spinner-border text-primary"></div></div>';
            const response = await fetchWithAuth(`${RENDER_URL}/api/all_data`);
            const res = await response.json();
            if (res.status === 'success') {
                rawData = res;
                setupFormOptions();
                initCalendar();
                renderDashboard();
            }
        } catch (err) {
            console.error(err);
        }
    }

    // --- 表單選單優化 (多選魔法) ---
    function setupFormOptions() {
        const filterProj = document.getElementById('filterProject');
        const filterMem = document.getElementById('filterMember');
        const taskProj = document.getElementById('task_project_name');
        const projLeader = document.getElementById('proj_leader');

        const clearOpt = '<option value="clear" selected>-- 全部顯示 (清除選擇) --</option>';
        filterProj.innerHTML = clearOpt;
        filterMem.innerHTML = clearOpt;
        taskProj.innerHTML = '';
        projLeader.innerHTML = '';

        if (rawData.projects) {
            rawData.projects.forEach(p => {
                if(!p[0]) return;
                filterProj.innerHTML += `<option value="${p[0]}">${p[0]}</option>`;
                taskProj.innerHTML += `<option value="${p[0]}">${p[0]}</option>`;
            });
        }

        let checkboxHtml = '';
        if (rawData.members) {
            rawData.members.forEach((m, i) => {
                if(!m[0]) return;
                filterMem.innerHTML += `<option value="${m[0]}">${m[0]}</option>`;
                projLeader.innerHTML += `<option value="${m[0]}">${m[0]}</option>`;
                checkboxHtml += `
                    <div class="form-check form-check-inline">
                        <input class="form-check-input member-checkbox" type="checkbox" value="${m[0]}" id="m_cb_${i}">
                        <label class="form-check-label" for="m_cb_${i}">${m[0]}</label>
                    </div>`;
            });
        }
        document.getElementById('proj_members_checkboxes').innerHTML = checkboxHtml;

        // 免按 Ctrl 邏輯
        document.querySelectorAll('select[multiple]').forEach(select => {
            select.onmousedown = function(e) {
                if (e.target.tagName === 'OPTION') {
                    e.preventDefault();
                    if (e.target.value === "clear") {
                        Array.from(this.options).forEach(opt => opt.selected = false);
                        e.target.selected = true;
                    } else {
                        this.options[0].selected = false;
                        e.target.selected = !e.target.selected;
                        if (Array.from(this.options).filter(opt => opt.selected).length === 0) {
                            this.options[0].selected = true;
                        }
                    }
                    this.dispatchEvent(new Event('change'));
                }
            };
        });

        updateProjectMembers();
        updateTaskOwners();
    }

    function toggleView() {
        const isCalendar = document.getElementById('viewCalendar').checked;
        document.getElementById('listView').style.display = isCalendar ? 'none' : 'block';
        document.getElementById('calendarView').style.display = isCalendar ? 'block' : 'none';
        if (isCalendar && calendar) calendar.render();
    }

    function toggleTaskForm() {
        const type = document.getElementById('task_type').value;
        const nature = document.getElementById('task_nature').value;
        document.getElementById('task_period').disabled = (type === '單一任務');
        document.getElementById('div_end_date').classList.toggle('d-none', type === '單一任務');
        document.getElementById('label_start_date').innerText = (type === '單一任務' ? '截止日期' : '開始日期');
        document.getElementById('div_owner_single').classList.toggle('d-none', nature === '協作任務');
        document.getElementById('div_owner_multi').classList.toggle('d-none', nature === '個人任務');
    }

    function updateProjectMembers() {
        const leader = document.getElementById('proj_leader').value;
        document.querySelectorAll('.member-checkbox').forEach(cb => {
            cb.disabled = (cb.value === leader);
            if (cb.value === leader) cb.checked = false;
        });
    }

    function updateTaskOwners() {
        const projName = document.getElementById('task_project_name').value;
        const project = rawData.projects.find(p => p[0] === projName);
        const singleBox = document.getElementById('task_owner_single');
        const multiBox = document.getElementById('task_owners_checkboxes');
        singleBox.innerHTML = ''; multiBox.innerHTML = '';
        if (!project) return;
        const members = Array.from(new Set([project[1], ...(project[2]||"").split(",").map(s=>s.trim())])).filter(s=>s);
        members.forEach((m, i) => {
            singleBox.innerHTML += `<option value="${m}">${m}</option>`;
            multiBox.innerHTML += `
                <div class="form-check form-check-inline">
                    <input class="form-check-input task-owner-checkbox" type="checkbox" value="${m}" id="t_cb_${i}">
                    <label class="form-check-label" for="t_cb_${i}">${m}</label>
                </div>`;
        });
    }

    function getSelectedValues(id) {
        const select = document.getElementById(id);
        const values = Array.from(select.selectedOptions).map(opt => opt.value);
        return (values.includes("clear") || values.length === 0) ? [] : values;
    }

    function getCheckedValues(className) {
        return Array.from(document.querySelectorAll(`.${className}:checked`)).map(cb => cb.value).join(', ');
    }

    // --- 資料提交 ---
    async function submitProject() {
        const payload = {
            name: document.getElementById('proj_name').value,
            leader: document.getElementById('proj_leader').value,
            members: getCheckedValues('member-checkbox'),
            desc: document.getElementById('proj_desc').value
        };
        if (!payload.name) return alert('請填寫名稱');
        const btn = document.getElementById('saveProjectBtn');
        btn.disabled = true;
        try {
            const res = await fetchWithAuth(`${RENDER_URL}/api/add_project`, {
                method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)
            });
            if (res.ok) { bootstrap.Modal.getInstance(document.getElementById('addProjectModal')).hide(); init(); }
        } catch(e) { console.error(e); } finally { btn.disabled = false; }
    }

    async function submitTask() {
        const type = document.getElementById('task_type').value;
        const nature = document.getElementById('task_nature').value;
        const startDate = document.getElementById('task_start_date').value;
        const endDate = document.getElementById('task_end_date').value;

        if (type === '重覆任務' && (!endDate || new Date(startDate) > new Date(endDate))) {
            return alert('重覆任務必須填寫結束日期，且不能早於開始日期！');
        }

        const payload = {
            project_name: document.getElementById('task_project_name').value,
            task_name: document.getElementById('task_name').value,
            type: type,
            period: document.getElementById('task_period').value,
            nature: nature,
            owners: (nature === '個人任務' ? document.getElementById('task_owner_single').value : getCheckedValues('task-owner-checkbox')),
            start_date: startDate,
            end_date: endDate,
            time: document.getElementById('task_time').value
        };

        if (!payload.task_name || !payload.start_date || !payload.owners) return alert('請完整填寫必填欄位');
        const btn = document.getElementById('saveTaskBtn');
        btn.disabled = true;
        try {
            const res = await fetchWithAuth(`${RENDER_URL}/api/add_task`, {
                method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)
            });
            if (res.ok) { bootstrap.Modal.getInstance(document.getElementById('addTaskModal')).hide(); init(); }
        } catch(e) { console.error(e); } finally { btn.disabled = false; }
    }

    function openEditModal(projName, taskName, rowIdx) {
        const task = rawData.tasks.find(t => t[0] === projName && t[1] === taskName);
        if (!task) return;
        document.getElementById('edit_old_project_name').value = projName;
        document.getElementById('edit_old_task_name').value = taskName;
        document.getElementById('edit_project_name_display').value = projName;
        document.getElementById('edit_task_name').value = taskName;
        document.getElementById('edit_task_status').value = task[10];
        document.getElementById('edit_task_row_idx').value = rowIdx;
        bootstrap.Modal.getOrCreateInstance(document.getElementById('editTaskModal')).show();
    }

    async function updateTask() {
        const btn = document.getElementById('updateTaskBtn');
        btn.disabled = true;
        const payload = {
            old_project_name: document.getElementById('edit_old_project_name').value,
            old_task_name: document.getElementById('edit_old_task_name').value,
            new_task_name: document.getElementById('edit_task_name').value,
            status: document.getElementById('edit_task_status').value,
            task_row_idx: document.getElementById('edit_task_row_idx').value
        };
        try {
            const res = await fetchWithAuth(`${RENDER_URL}/api/edit_task`, {
                method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)
            });
            if (res.ok) { bootstrap.Modal.getInstance(document.getElementById('editTaskModal')).hide(); init(); }
        } catch(e) { console.error(e); } finally { btn.disabled = false; }
    }

    async function deleteTask() {
        if (!confirm("確定刪除此任務？")) return;
        const btn = document.getElementById('deleteTaskBtn');
        btn.disabled = true;
        const payload = {
            project_name: document.getElementById('edit_old_project_name').value,
            task_name: document.getElementById('edit_old_task_name').value,
            task_row_idx: document.getElementById('edit_task_row_idx').value
        };
        try {
            const res = await fetchWithAuth(`${RENDER_URL}/api/delete_task`, {
                method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)
            });
            if (res.ok) { bootstrap.Modal.getInstance(document.getElementById('editTaskModal')).hide(); init(); }
        } catch(e) { console.error(e); } finally { btn.disabled = false; }
    }

    async function updateStatus(proj, task, rowIdx, el) {
        const status = el.value;
        el.style.opacity = '0.5';
        try {
            const res = await fetchWithAuth(`${RENDER_URL}/api/update_task_status`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ project_name: proj, task_name: task, status: status, task_row_idx: rowIdx })
            });
            if (res.ok) init();
        } catch(e) { console.error(e); el.style.opacity = '1'; }
    }

    // --- 渲染畫面 (完整保留您的日曆迴圈) ---
    function renderDashboard() {
        const memberFilters = getSelectedValues('filterMember');
        const projectFilters = getSelectedValues('filterProject');
        const statusFilters = getSelectedValues('filterStatus');
        
        let listHtml = '';
        let calendarEvents = [];

        if (rawData.projects) {
            rawData.projects.forEach(p => {
                const projName = p[0];
                if (projectFilters.length > 0 && !projectFilters.includes(projName)) return;

                const projectTasks = (rawData.tasks || []).filter(t => t[0] === projName);
                
                let taskCount = 0;
                const projStatus = p[3] || '未開始';
                const projBadge = projStatus === '已完成' ? 'bg-success' : (projStatus === '進行中' ? 'bg-primary' : 'bg-secondary');

                let projectHtml = `
                    <div class="card project-card shadow-sm">
                        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                            <h5 class="mb-0">📂 ${projName}</h5>
                            <span class="badge ${projBadge}">${projStatus}</span>
                        </div>
                        <div class="card-body">
                `;
                
                if (projectTasks.length > 0) {
                    projectTasks.forEach(t => {
                        const taskName = t[1];
                        const taskType = t[2];
                        const taskPeriod = t[3];
                        const taskOwners = t[5];
                        const taskStartDate = t[7];
                        const taskEndDate = t[8];
                        const taskTime = t[9];
                        const taskStatus = t[10];
                        const rowIdx = t[t.length - 1]; // 後端傳來的最後一個元素是列數
                        
                        const matchMember = memberFilters.length === 0 || memberFilters.some(m => taskOwners.includes(m));
                        const matchStatus = statusFilters.length === 0 || statusFilters.includes(taskStatus);
                        
                        if (!matchMember || !matchStatus) return;
                        
                        taskCount++;
                        const statusColor = taskStatus === '已完成' ? 'success' : (taskStatus === '進行中' ? 'primary' : 'secondary');
                        const typeBorder = taskType === '單一任務' ? 'info' : 'warning';
                        
                        projectHtml += `
                            <div class="task-item border-start border-4 border-${typeBorder}">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div class="flex-grow-1" onclick="openEditModal('${projName}', '${taskName}', ${rowIdx})" style="cursor:pointer">
                                        <h6 class="mb-1">${taskName} <span class="badge bg-light text-dark border">${taskType}</span></h6>
                                        <p class="small text-muted mb-0">👤 ${taskOwners} | 📅 ${taskStartDate} ${taskEndDate ? '~ ' + taskEndDate : ''}</p>
                                    </div>
                                    <div class="d-flex align-items-center">
                                        <select class="form-select form-select-sm status-select text-${statusColor} border-${statusColor}" onchange="updateStatus('${projName}', '${taskName}', ${rowIdx}, this)">
                                            <option value="未開始" ${taskStatus === '未開始' ? 'selected' : ''}>未開始</option>
                                            <option value="進行中" ${taskStatus === '進行中' ? 'selected' : ''}>進行中</option>
                                            <option value="已完成" ${taskStatus === '已完成' ? 'selected' : ''}>已完成</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                        `;

                        // 您的原版：完整日曆事件渲染邏輯 (處理重覆任務)
                        const calColor = taskStatus === '已完成' ? '#198754' : (taskStatus === '進行中' ? '#0d6efd' : '#6c757d');
                        const cleanProps = { proj: projName, task: taskName, row: rowIdx };

                        if (taskType === '重覆任務' && taskPeriod !== 'N/A' && taskEndDate && taskStartDate) {
                            let currDate = new Date(taskStartDate);
                            let endD = new Date(taskEndDate);
                            let safeguard = 0;
                            while (currDate <= endD && safeguard < 1000) {
                                // 避免時區問題，使用本地端字串組合
                                let year = currDate.getFullYear();
                                let month = String(currDate.getMonth() + 1).padStart(2, '0');
                                let day = String(currDate.getDate()).padStart(2, '0');
                                let dateStr = `${year}-${month}-${day}`;
                                
                                let startDateTime = taskTime ? `${dateStr}T${taskTime}` : dateStr;
                                calendarEvents.push({
                                    title: `${taskStatus === '已完成' ? '✅' : '📌'} ${taskName}`,
                                    start: startDateTime,
                                    backgroundColor: calColor,
                                    extendedProps: cleanProps
                                });

                                if (taskPeriod === '每天') {
                                    currDate.setDate(currDate.getDate() + 1);
                                } else if (taskPeriod === '每週') {
                                    currDate.setDate(currDate.getDate() + 7);
                                } else if (taskPeriod === '每月') {
                                    currDate.setMonth(currDate.getMonth() + 1);
                                } else {
                                    break; 
                                }
                                safeguard++;
                            }
                        } else if (taskStartDate) {
                            let startDateTime = taskTime ? `${taskStartDate}T${taskTime}` : taskStartDate;
                            calendarEvents.push({
                                title: `${taskStatus === '已完成' ? '✅' : '📌'} ${taskName}`,
                                start: startDateTime,
                                backgroundColor: calColor,
                                extendedProps: cleanProps
                            });
                        }
                    });
                }
                
                projectHtml += `</div></div>`;
                if (taskCount > 0 || (statusFilters.length === 0 && memberFilters.length === 0)) {
                    listHtml += projectHtml;
                }
            });
        }
        
        document.getElementById('dashboardContent').innerHTML = listHtml || '<div class="text-center py-5 text-muted">無符合的任務與事項</div>';
        
        if (calendar) {
            calendar.removeAllEvents();
            calendar.addEventSource(calendarEvents);
        }
    }

    function initCalendar() {
        const el = document.getElementById('calendar');
        calendar = new FullCalendar.Calendar(el, {
            initialView: 'dayGridMonth',
            locale: 'zh-tw',
            headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,listMonth' },
            eventClick: (info) => {
                const p = info.event.extendedProps;
                openEditModal(p.proj, p.task, p.row);
            }
        });
        calendar.render();
    }
</script>
</body>
</html>
